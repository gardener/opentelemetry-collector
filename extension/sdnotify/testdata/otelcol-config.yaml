# Minimal collector config used by the systemd integration test.
# The pipeline exists only so the collector reaches the Ready state and the
# sdnotify extension's Ready() runs against the real $NOTIFY_SOCKET.

extensions:
  sdnotifyextension:
    # If NOTIFY_SOCKET is not set, fail Start() before Ready() runs.
    # This turns the systemd wiring into a load-bearing precondition: any
    # misconfiguration on the systemd side fails the unit instead of silently
    # no-op'ing the notify.
    fail_if_not_supervised: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317

exporters:
  debug: {}

service:
  extensions: [sdnotifyextension]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]

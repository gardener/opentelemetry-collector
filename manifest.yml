dist:
  name: otelcol
  description: Gardener OTel Collector distribution
  output_path: ./_build
  version: 0.0.0

exporters:
  # Standard exporters
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.156.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.156.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.156.0
  - gomod: go.opentelemetry.io/collector/exporter/nopexporter v0.156.0
  # Contrib exporters
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/opensearchexporter v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/alertmanagerexporter v0.156.0

processors:
  # Standard processors
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.156.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.156.0
  # Contrib processors
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/filterprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/groupbyattrsprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/metricstransformprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourcedetectionprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/tailsamplingprocessor v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.156.0

receivers:
  # Standard receivers
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.156.0
  # Contrib receivers
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/jaegerreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/journaldreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8seventsreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sobjectsreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.156.0
  - gomod: github.com/gardener/opentelemetry-collector/receiver/gardenerreceiver v0.0.0



extensions:
  # Contrib extensions
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/basicauthextension v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oauth2clientauthextension v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/observer/hostobserver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/observer/k8sobserver v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oidcauthextension v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.156.0
  - gomod: github.com/gardener/opentelemetry-collector/extension/sdnotify v0.0.0

connectors:
  # Standard connectors
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.156.0
  # Contrib connectors
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/countconnector v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/routingconnector v0.156.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/spanmetricsconnector v0.156.0

replaces:
  - github.com/gardener/opentelemetry-collector/receiver/gardenerreceiver => ../receiver/gardenerreceiver
  - github.com/gardener/opentelemetry-collector/extension/sdnotify => ../extension/sdnotify
